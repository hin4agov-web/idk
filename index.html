<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Site</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#050505,#111827,#000);
    color:white;
    height:100vh;
}

/* ОБЩИЕ ЭКРАНЫ */

.screen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* ПАРОЛЬ */

.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 40px rgba(255,255,255,0.08);
}

h1{
    margin-bottom:20px;
}

input{
    width:260px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:18px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:12px 30px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.yes{
    background:#22c55e;
    color:white;
}

.no{
    background:#3b82f6;
    color:white;
}

.hidden{
    display:none;
}

/* ВОПРОС */

#question h1{
    font-size:60px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:20px;
}

/* ЦВЕТЫ */

#flowers{
    overflow:hidden;
}

.flower{
    position:absolute;
    font-size:40px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}

/* ФОТО + МУЗЫКА */

#musicPage{
    overflow:auto;
    padding:30px;
}

.card{
    width:min(900px,95%);
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:30px;

    text-align:center;

    box-shadow:0 0 50px rgba(255,255,255,0.08);
}

.photo{
    width:min(350px,90%);
    border-radius:25px;

    box-shadow:
    0 0 20px #fff,
    0 0 40px #60a5fa;

    margin-bottom:25px;
}

.title{
    font-size:40px;
    margin-bottom:25px;
}

.player{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.song{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
}

audio{
    width:100%;
}

@media(max-width:700px){

    #question h1{
        font-size:40px;
    }

    .buttons{
        flex-direction:column;
    }

}

</style>
</head>
<body>

<!-- ПАРОЛЬ -->

<div class="screen" id="login">

    <div class="glass">

        <h1>🔒 Private</h1>

        <input
        type="password"
        id="password"
        placeholder="Password">

        <br>

        <button onclick="checkPassword()">
            Enter
        </button>

    </div>

</div>

<!-- ВОПРОС -->

<div class="screen hidden" id="question">

    <h1>Грустим?</h1>

    <div class="buttons">

        <button class="yes" onclick="showFlowers()">
            Да
        </button>

        <button class="no" onclick="showMusic()">
            Нет
        </button>

    </div>

</div>

<!-- ЦВЕТЫ -->

<div class="screen hidden" id="flowers">

    <h1 style="position:relative;z-index:10;">
        Я тя ударю.
    </h1>

</div>

<!-- ФОТО + МУЗЫКА -->

<div class="screen hidden" id="musicPage">

    <div class="card">

        <div class="title">
            Все равно ударю
        </div>

        <!-- ТВОЁ ФОТО -->

        <img
        src="photo1.jpg"
        class="photo"
        alt="photo">

        <h2 style="margin-bottom:20px;">
            Музыка для хорошего настроения
        </h2>

        <div class="player">

            <div class="song">
                <p>Song 1</p>
                <audio controls>
                    <source src="song1.mp3">
                </audio>
            </div>

            <div class="song">
                <p>Song 2</p>
                <audio controls>
                    <source src="song2.mp3">
                </audio>
            </div>

            <div class="song">
                <p>Song 3</p>
                <audio controls>
                    <source src="song3.mp3">
                </audio>
            </div>

            <div class="song">
                <p>Song 4</p>
                <audio controls>
                    <source src="song4.mp3">
                </audio>
            </div>

            <div class="song">
                <p>Song 5</p>
                <audio controls>
                    <source src="song5.mp3">
                </audio>
            </div>

        </div>

    </div>

</div>

<script>

function checkPassword(){

    const pass =
    document.getElementById("password").value;

    if(pass === "20082006"){

        document
        .getElementById("login")
        .classList.add("hidden");

        document
        .getElementById("question")
        .classList.remove("hidden");

    }else{

        alert("Неверный пароль");

    }

}

function showFlowers(){

    document
    .getElementById("question")
    .classList.add("hidden");

    document
    .getElementById("flowers")
    .classList.remove("hidden");

    const flowers =
    document.getElementById("flowers");

    const emojis = [
    "🌸","🌺","🌷","🌹","💐","🌼"
    ];

    setInterval(()=>{

        const flower =
        document.createElement("div");

        flower.className = "flower";

        flower.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

        flower.style.left =
        Math.random()*100 + "vw";

        flower.style.animationDuration =
        4 + Math.random()*5 + "s";

        flower.style.fontSize =
        30 + Math.random()*40 + "px";

        flowers.appendChild(flower);

        setTimeout(()=>{
            flower.remove();
        },9000);

    },200);

}

function showMusic(){

    document
    .getElementById("question")
    .classList.add("hidden");

    document
    .getElementById("musicPage")
    .classList.remove("hidden");

}

</script>

</body>
</html>
